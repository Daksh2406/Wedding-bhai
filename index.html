<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vishal ❤️ Monika Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#fff8f2;
color:#333;
}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486') center/cover;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:50px;
}

.hero p{
margin-top:10px;
font-size:20px;
}

/* COUNTDOWN */
.countdown{
margin-top:20px;
display:flex;
justify-content:center;
gap:15px;
}

.count-box{
background:#fff;
color:#b8860b;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
}

/* SECTION */
section{
padding:60px 20px;
text-align:center;
}

h2{
font-family:'Playfair Display';
font-size:35px;
color:#800000;
margin-bottom:20px;
}

/* MAP */
.map{
width:90%;
max-width:800px;
margin:auto;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:15px;
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* FEEDBACK */
form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
}

input,textarea{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

button{
padding:12px;
border:none;
background:#b8860b;
color:#fff;
border-radius:20px;
cursor:pointer;
}

/* FOOTER */
footer{
background:#800000;
color:#fff;
padding:20px;
text-align:center;
}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div>
<h1>💍 Vishal ❤️ Monika</h1>
<p>25 मई 2026</p>

<div class="countdown" id="countdown"></div>

</div>
</div>

<!-- SAGAI -->
<section class="fade">
<h2>📍 Sagai Location</h2>
<div class="map">
<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3489.26877558006!2d77.75657837458827!3d29.009031766885588!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390c7b4b0005917b%3A0x187c2febc485c0be!2sVR%20Digital%20Pro!5e0!3m2!1sen!2sin!4v1777911255360!5m2!1sen!2sin" width="100%" height="300"></iframe>
</div>
</section>

<!-- SHAADI -->
<section class="fade">
<h2>📍 Shaadi Location</h2>
<div class="map">
<iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d1638.410339004858!2d77.76535639788048!3d28.993377617868465!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sbest%20mandap!5e0!3m2!1sen!2sin!4v1777911383985!5m2!1sen!2sin" width="100%" height="300"></iframe>
</div>
</section>

<!-- GALLERY -->
<section class="fade">
<h2>📸 Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
<img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
<img src="http://weddingphotoplanet.com/blog/wp-content/uploads/2024/03/PASI3945-Edit-1024x700.jpg">
</div>
</section>

<!-- FEEDBACK -->
<section class="fade">
<h2>💬 Send Wishes</h2>
<form onsubmit="sendMsg(event)">
<input type="text" placeholder="Name" required>
<textarea placeholder="Message" required></textarea>
<button>Send</button>
</form>
</section>

<footer>
<p>🙏 आपका स्वागत है ❤️</p>
<p>Making by Daksh Kumar</p>
</footer>

<script>

/* COUNTDOWN FIXED */
let target = new Date("2026-05-25T00:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = target - now;

let d = Math.floor(diff/(1000*60*60*24));
let h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((diff%(1000*60*60))/(1000*60));
let s = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
`<div class="count-box">${d}d</div>
 <div class="count-box">${h}h</div>
 <div class="count-box">${m}m</div>
 <div class="count-box">${s}s</div>`;
},1000);

/* SCROLL ANIMATION */
let observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});

document.querySelectorAll(".fade").forEach(el=>observer.observe(el));

/* FORM */
function sendMsg(e){
e.preventDefault();
alert("Thank you ❤️");
}

</script>

</body>
</html>
